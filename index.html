
1	<!DOCTYPE html>

3	<head> 
4	    <meta charset="UTF-8"> 
5	    <meta name="viewport" content="width=device-width, initial-scale=1.0">

7	    <style> 
8	        :root { --primary: #2563eb; --dark: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --danger: #ef4444; } 
9	        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--dark); line-height: 1.6; } 
10	        .hero { background: linear-gradient(135deg, var(--dark) 0%, #334155 100%); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--primary); } 
11	        .hero h1 { font-size: 2.5rem; margin: 0; } 
12	        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 900px; margin: -30px auto 20px; padding: 0 20px; } 
13	        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary); } 
14	        .stat-card h2 { margin: 0; color: var(--primary); font-size: 2.2rem; } 
15	        .stat-card span { font-size: 0.8rem; font-weight: bold; color: #64748b; } 
16	        .container { max-width: 900px; margin: auto; padding: 20px; } 
17	        .search-wrapper { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; } 
18	        #buscar { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--primary); font-size: 1rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); outline: none; box-sizing: border-box; } 
19	        .login-section { background: #f1f5f9; padding: 12px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border: 1px dashed #cbd5e1; } 
20	        .login-section input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; } 
21	        #editor-panel { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e2e8f0; } 
22	        .form-group { margin-bottom: 15px; } 
23	        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; } 
24	        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; } 
25	        textarea { height: 80px; } 
26	        .card { background: white; margin-bottom: 10px; border-radius: 10px; border-left: 6px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); } 
27	        .card.software { border-left-color: var(--accent); } 
28	        .card.hardware { border-left-color: #f59e0b; } 
29	        .card-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; } 
30	        .card-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; padding: 0 20px; } 
31	        .card.active .card-content { max-height: 1000px; padding: 15px 20px 20px; border-top: 1px solid #f1f5f9; } 
32	        .solucion-box { background: #f0fdf4; padding: 15px; border-radius: 8px; color: #166534; border: 1px solid #dcfce7; margin-top: 10px; white-space: pre-wrap; } 
33	        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; } 
34	        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; } 
35	        .btn-danger { background: #fee2e2; color: var(--danger); font-size: 0.8rem; } 
36	    </style>

38	<body> 
39	 
40	    <section class="hero"> 
41	        <h1>Wiki Soporte IT</h1> 
42	        <p>Repositorio de @edinson1102</p> 
43	    </section> 
44	 
45	    <div class="stats-container"> 
46	        <div class="stat-card"><h2 id="count-total">0</h2><span>TOTAL</span></div> 
47	        <div class="stat-card"><h2 id="count-software">0</h2><span>SOFTWARE</span></div> 
48	        <div class="stat-card"><h2 id="count-hardware">0</h2><span>HARDWARE</span></div> 
49	    </div> 
50	 
51	    <div class="container"> 
52	        <div class="search-wrapper"> 
53	            <input type="text" id="buscar" placeholder="🔍 Buscar error, causa o solución..." oninput="renderizar()"> 
54	        </div> 
55	 
56	        <div class="login-section"> 
57	            <input type="password" id="pass-sencilla" placeholder="Clave admin"> 
58	            <button onclick="activarAdmin()" class="btn" style="background:var(--dark); color:white;">🔐 Entrar</button> 
59	        </div> 
60	 
61	        <div id="editor-panel"> 
62	            <h3 id="form-title" style="margin-top:0;">📝 Nueva Incidencia</h3> 
63	            <input type="hidden" id="edit-id"> 
64	            <div class="form-group"><label>Título</label><input type="text" id="titulo"></div> 
65	            <div class="form-group"> 
66	                <label>Categoría</label> 
67	                <select id="categoria"> 
68	                    <option value="software">💿 Software</option> 
69	                    <option value="hardware">💻 Hardware</option> 
70	                </select> 
71	            </div> 
72	            <div class="form-group"><label>Causa</label><textarea id="causa"></textarea></div> 
73	            <div class="form-group"><label>Solución Paso a Paso</label><textarea id="solucion"></textarea></div> 
74	            <button onclick="sincronizar()" id="btn-sync" class="btn btn-primary">🚀 GUARDAR CAMBIOS EN GITHUB</button> 
75	        </div> 
76	 
77	        <div id="lista"></div> 
78	    </div> 
79	 
80	<script> 
81	    const CLAVE_CORRECTA = "admin123";  
82	    const TOKEN_HIDDEN = "Z2hwX0J6ZXV3NkJWV0VleHNMdURyR1FNekw4eG1SdGV6TDJLQ2Q4bQ=="; 
83	 
84	    const CONFIG = { 
85	        owner: 'edinson1102',  
86	        repo: 'Soporte-it', 
87	        path: 'errores.json' 
88	    }; 
89	 
90	    let db = []; 
91	 
92	    async function cargar() { 
93	        try { 
94	            // Usamos la API de contenidos para evitar el caché de Raw 
95	            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`); 
96	            const data = await res.json(); 
97	            // Decodificar Base64 manejando caracteres especiales (UTF-8) 
98	            const contenidoDecodificado = decodeURIComponent(escape(atob(data.content))); 
99	            db = JSON.parse(contenidoDecodificado); 
100	            actualizarStats(); 
101	            renderizar(); 
102	        } catch (e) {  
103	            console.error("Error cargando DB:", e); 
104	            document.getElementById('lista').innerHTML = "⚠️ Error al conectar con el archivo errores.json en GitHub."; 
105	        } 
106	    } 
107	 
108	    function actualizarStats() { 
109	        document.getElementById('count-total').innerText = db.length; 
110	        document.getElementById('count-software').innerText = db.filter(i => i.categoria === 'software').length; 
111	        document.getElementById('count-hardware').innerText = db.filter(i => i.categoria === 'hardware').length; 
112	    } 
113	 
114	    function renderizar() { 
115	        const q = document.getElementById('buscar').value.toLowerCase(); 
116	        const lista = document.getElementById('lista'); 
117	        const isAdmin = document.getElementById('pass-sencilla').value === CLAVE_CORRECTA; 
118	        lista.innerHTML = ''; 
119	 
120	        db.filter(i => i.titulo.toLowerCase().includes(q) || i.solucion.toLowerCase().includes(q) || i.causa.toLowerCase().includes(q)) 
121	          .forEach(item => { 
122	            const div = document.createElement('div'); 
123	            div.className = `card ${item.categoria}`; 
124	            div.innerHTML = ` 
125	                <div class="card-header" onclick="this.parentElement.classList.toggle('active')"> 
126	                    <span>${item.titulo}</span> 
127	                    <small style="opacity:0.6">${item.categoria.toUpperCase()}</small> 
128	                </div> 
129	                <div class="card-content"> 
130	                    <p><strong>Causa:</strong><br>${item.causa}</p> 
131	                    <div class="solucion-box"><strong>✅ Solución:</strong><br>${item.solucion}</div> 
132	                    ${isAdmin ? `<div style="text-align:right; margin-top:15px;"> 
133	                        <button onclick="prepararEdicion(${item.id})" class="btn" style="background:#e0f2fe; color:#0369a1;">✏️ Editar</button> 
134	                        <button onclick="borrar(${item.id})" class="btn btn-danger">🗑️ Borrar</button> 
135	                    </div>` : ''} 
136	                </div>`; 
137	            lista.appendChild(div); 
138	        }); 
139	    } 
140	 
141	    async function sincronizar() { 
142	        const btn = document.getElementById('btn-sync'); 
143	        const id = document.getElementById('edit-id').value; 
144	         
145	        btn.disabled = true;  
146	        btn.innerText = "⏳ Sincronizando con la nube..."; 
147	 
148	        const registro = { 
149	            id: id ? parseInt(id) : Date.now(), 
150	            titulo: document.getElementById('titulo').value, 
151	            categoria: document.getElementById('categoria').value, 
152	            causa: document.getElementById('causa').value, 
153	            solucion: document.getElementById('solucion').value, 
154	            autor: "Soporte Técnico", 
155	            fecha: new Date().toISOString().split('T')[0] 
156	        }; 
157	 
158	        let nuevaDb = [...db]; 
159	        if(id) { 
160	            const idx = nuevaDb.findIndex(i => i.id == id); 
161	            if(idx !== -1) nuevaDb[idx] = registro; 
162	        } else { 
163	            nuevaDb.unshift(registro); 
164	        } 
165	 
166	        try { 
167	            const token = atob(TOKEN_HIDDEN); 
168	            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`; 
169	             
170	            // 1. Obtener el SHA actual (obligatorio para GitHub) 
171	            const resGet = await fetch(url, { headers: { 'Authorization': `token ${token}` }}); 
172	            const dataGet = await resGet.json(); 
173	 
174	            // 2. Subir el nuevo archivo 
175	            const resPut = await fetch(url, { 
176	                method: 'PUT', 
177	                headers: {  
178	                    'Authorization': `token ${token}`,  
179	                    'Content-Type': 'application/json'  
180	                }, 
181	                body: JSON.stringify({ 
182	                    message: "Wiki Update: " + registro.titulo, 
183	                    content: btoa(unescape(encodeURIComponent(JSON.stringify(nuevaDb, null, 2)))), 
184	                    sha: dataGet.sha 
185	                }) 
186	            }); 
187	 
188	            if(resPut.ok) { 
189	                alert("✅ ¡Cambios guardados en GitHub!"); 
190	                location.reload(); 
191	            } else { 
192	                const errorLog = await resPut.json(); 
193	                alert("❌ Error de GitHub: " + errorLog.message); 
194	            } 
195	        } catch (e) { 
196	            alert("❌ Error de conexión: " + e.message); 
197	        } finally { 
198	            btn.disabled = false; 
199	            btn.innerText = "🚀 GUARDAR CAMBIOS EN GITHUB"; 
200	        } 
201	    } 
202	 
203	    function activarAdmin() { 
204	        if(document.getElementById('pass-sencilla').value === CLAVE_CORRECTA) { 
205	            document.getElementById('editor-panel').style.display = 'block'; 
206	            renderizar(); 
207	        } else { alert("Clave incorrecta"); } 
208	    } 
209	 
210	    function prepararEdicion(id) { 
211	        const i = db.find(item => item.id === id); 
212	        document.getElementById('edit-id').value = i.id; 
213	        document.getElementById('titulo').value = i.titulo; 
214	        document.getElementById('categoria').value = i.categoria; 
215	        document.getElementById('causa').value = i.causa; 
216	        document.getElementById('solucion').value = i.solucion; 
217	        document.getElementById('form-title').innerText = "✏️ Editando Incidencia"; 
218	        window.scrollTo({top: 400, behavior: 'smooth'}); 
219	    } 
220	 
221	    async function borrar(id) { 
222	        if(!confirm("¿Deseas eliminar este registro de la nube?")) return; 
223	        db = db.filter(i => i.id !== id); 
224	        // Llamamos a una versión simplificada de sincronizar para el borrado 
225	        sincronizar(); 
226	    } 
227	 
228	    cargar(); 
229	</script>
