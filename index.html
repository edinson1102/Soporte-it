<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte IT | Wiki edinson1102</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--dark); line-height: 1.6; }
        .hero { background: linear-gradient(135deg, var(--dark) 0%, #334155 100%); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--primary); }
        .hero h1 { font-size: 2.5rem; margin: 0; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 900px; margin: -30px auto 20px; padding: 0 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary); }
        .stat-card h2 { margin: 0; color: var(--primary); font-size: 2.2rem; }
        .stat-card span { font-size: 0.8rem; font-weight: bold; color: #64748b; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .search-wrapper { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; }
        #buscar { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--primary); font-size: 1rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); outline: none; box-sizing: border-box; }
        .login-section { background: #f1f5f9; padding: 12px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border: 1px dashed #cbd5e1; }
        .login-section input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        #editor-panel { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 80px; }
        .card { background: white; margin-bottom: 10px; border-radius: 10px; border-left: 6px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.software { border-left-color: var(--accent); }
        .card.hardware { border-left-color: #f59e0b; }
        .card-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .card-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; padding: 0 20px; }
        .card.active .card-content { max-height: 1000px; padding: 15px 20px 20px; border-top: 1px solid #f1f5f9; }
        .solucion-box { background: #f0fdf4; padding: 15px; border-radius: 8px; color: #166534; border: 1px solid #dcfce7; margin-top: 10px; white-space: pre-wrap; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: #fee2e2; color: var(--danger); font-size: 0.8rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Wiki Soporte IT</h1>
        <p>Repositorio de @edinson1102</p>
    </section>

    <div class="stats-container">
        <div class="stat-card"><h2 id="count-total">0</h2><span>TOTAL</span></div>
        <div class="stat-card"><h2 id="count-software">0</h2><span>SOFTWARE</span></div>
        <div class="stat-card"><h2 id="count-hardware">0</h2><span>HARDWARE</span></div>
    </div>

    <div class="container">
        <div class="search-wrapper">
            <input type="text" id="buscar" placeholder="🔍 Buscar error, causa o solución..." oninput="renderizar()">
        </div>

        <div class="login-section">
            <input type="password" id="pass-sencilla" placeholder="Clave admin">
            <button onclick="activarAdmin()" class="btn" style="background:var(--dark); color:white;">🔐 Entrar</button>
        </div>

        <div id="editor-panel">
            <h3 id="form-title" style="margin-top:0;">📝 Nueva Incidencia</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Título</label><input type="text" id="titulo"></div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="categoria">
                    <option value="software">💿 Software</option>
                    <option value="hardware">💻 Hardware</option>
                </select>
            </div>
            <div class="form-group"><label>Causa</label><textarea id="causa"></textarea></div>
            <div class="form-group"><label>Solución Paso a Paso</label><textarea id="solucion"></textarea></div>
            <button onclick="sincronizar()" id="btn-sync" class="btn btn-primary">🚀 GUARDAR CAMBIOS EN GITHUB</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    const CLAVE_CORRECTA = "admin123"; 
    const TOKEN_HIDDEN = "Z2hwXzBtRXJiT2VidlZuWkNnZ0I1ZUVEY1Zzb21GMzBvOTIycGNodw==";

    const CONFIG = {
        owner: 'edinson1102', 
        repo: 'Soporte-it',
        path: 'errores.json'
    };

    let db = [];

    async function cargar() {
        try {
            // Usamos la API de contenidos para evitar el caché de Raw
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`);
            const data = await res.json();
            // Decodificar Base64 manejando caracteres especiales (UTF-8)
            const contenidoDecodificado = decodeURIComponent(escape(atob(data.content)));
            db = JSON.parse(contenidoDecodificado);
            actualizarStats();
            renderizar();
        } catch (e) { 
            console.error("Error cargando DB:", e);
            document.getElementById('lista').innerHTML = "⚠️ Error al conectar con el archivo errores.json en GitHub.";
        }
    }

    function actualizarStats() {
        document.getElementById('count-total').innerText = db.length;
        document.getElementById('count-software').innerText = db.filter(i => i.categoria === 'software').length;
        document.getElementById('count-hardware').innerText = db.filter(i => i.categoria === 'hardware').length;
    }

    function renderizar() {
        const q = document.getElementById('buscar').value.toLowerCase();
        const lista = document.getElementById('lista');
        const isAdmin = document.getElementById('pass-sencilla').value === CLAVE_CORRECTA;
        lista.innerHTML = '';

        db.filter(i => i.titulo.toLowerCase().includes(q) || i.solucion.toLowerCase().includes(q) || i.causa.toLowerCase().includes(q))
          .forEach(item => {
            const div = document.createElement('div');
            div.className = `card ${item.categoria}`;
            div.innerHTML = `
                <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${item.titulo}</span>
                    <small style="opacity:0.6">${item.categoria.toUpperCase()}</small>
                </div>
                <div class="card-content">
                    <p><strong>Causa:</strong><br>${item.causa}</p>
                    <div class="solucion-box"><strong>✅ Solución:</strong><br>${item.solucion}</div>
                    ${isAdmin ? `<div style="text-align:right; margin-top:15px;">
                        <button onclick="prepararEdicion(${item.id})" class="btn" style="background:#e0f2fe; color:#0369a1;">✏️ Editar</button>
                        <button onclick="borrar(${item.id})" class="btn btn-danger">🗑️ Borrar</button>
                    </div>` : ''}
                </div>`;
            lista.appendChild(div);
        });
    }

    async function sincronizar() {
        const btn = document.getElementById('btn-sync');
        const id = document.getElementById('edit-id').value;
        
        btn.disabled = true; 
        btn.innerText = "⏳ Sincronizando con la nube...";

        const registro = {
            id: id ? parseInt(id) : Date.now(),
            titulo: document.getElementById('titulo').value,
            categoria: document.getElementById('categoria').value,
            causa: document.getElementById('causa').value,
            solucion: document.getElementById('solucion').value,
            autor: "Soporte Técnico",
            fecha: new Date().toISOString().split('T')[0]
        };

        let nuevaDb = [...db];
        if(id) {
            const idx = nuevaDb.findIndex(i => i.id == id);
            if(idx !== -1) nuevaDb[idx] = registro;
        } else {
            nuevaDb.unshift(registro);
        }

        try {
            const token = atob(TOKEN_HIDDEN);
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
            
            // 1. Obtener el SHA actual (obligatorio para GitHub)
            const resGet = await fetch(url, { headers: { 'Authorization': `token ${token}` }});
            const dataGet = await resGet.json();

            // 2. Subir el nuevo archivo
            const resPut = await fetch(url, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    message: "Wiki Update: " + registro.titulo,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(nuevaDb, null, 2)))),
                    sha: dataGet.sha
                })
            });

            if(resPut.ok) {
                alert("✅ ¡Cambios guardados en GitHub!");
                location.reload();
            } else {
                const errorLog = await resPut.json();
                alert("❌ Error de GitHub: " + errorLog.message);
            }
        } catch (e) {
            alert("❌ Error de conexión: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 GUARDAR CAMBIOS EN GITHUB";
        }
    }

    function activarAdmin() {
        if(document.getElementById('pass-sencilla').value === CLAVE_CORRECTA) {
            document.getElementById('editor-panel').style.display = 'block';
            renderizar();
        } else { alert("Clave incorrecta"); }
    }

    function prepararEdicion(id) {
        const i = db.find(item => item.id === id);
        document.getElementById('edit-id').value = i.id;
        document.getElementById('titulo').value = i.titulo;
        document.getElementById('categoria').value = i.categoria;
        document.getElementById('causa').value = i.causa;
        document.getElementById('solucion').value = i.solucion;
        document.getElementById('form-title').innerText = "✏️ Editando Incidencia";
        window.scrollTo({top: 400, behavior: 'smooth'});
    }

    async function borrar(id) {
        if(!confirm("¿Deseas eliminar este registro de la nube?")) return;
        db = db.filter(i => i.id !== id);
        // Llamamos a una versión simplificada de sincronizar para el borrado
        sincronizar();
    }

    cargar();
</script>
</body>

</html>
